services:
  db:
      image: postgres:16-alpine
      container_name: workout-tracker-db
      restart: unless-stopped
      environment:
        POSTGRES_USER: workout
        POSTGRES_PASSWORD: workout
        POSTGRES_DB: workout_tracker
      ports:
        - "5432:5432"
      volumes:
        - workout-tracker-db-data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U workout -d workout_tracker"]
        interval: 5s
        timeout: 5s
        retries: 5
volumes:
  workout-tracker-db-data: